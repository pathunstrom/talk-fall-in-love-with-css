<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
  <style>
    * {
      padding: 0.5em;
      font-size: 24pt;
    }

    :root {
        --primary-color: indigo;
        --contrast-color: gold;
        --highlight-color: darkgreen;
        color-scheme: dark light;
    }

    * {
      background-color: light-dark(var(--contrast-color), var(--primary-color));
      color: light-dark(var(--primary-color), var(--contrast-color));
    }

    .second {
      font-family: "Source Code Pro", monospace
      color: red;
      --primary-color: blue;
    }

    .first::after {
      content: "I don't exist in the dom, but will be rendered.";
      display: inline-block;
      padding-left: 0.5em;
    }

    div:hover {
      background-color: red;
    }
  </style>
</head>
<body>
  <div class="first">Putting text here.</div>
  <div class="second">More sample text</div>
  <div class="third">Final text</div>
</body>
</html>
