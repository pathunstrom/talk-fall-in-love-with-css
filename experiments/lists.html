<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
  <style>
      ul li {
        background-color: yellow;
      }

      ul > li {
        background-color: red;
      }
  </style>
</head>
<body>
  <ul>
    <li>Some content with nesting.
      <ol>
        <li>First Order</li>
        <li>Second order</li>
      </ol>
    </li>
    <li>Not nested.</li>
  </ul>
</body>
</html>
